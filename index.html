<!DOCTYPE html>
<html lang="ko">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18085291008"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'AW-18085291008');
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlackLabs Insight</title>
  
  <link rel="icon" type="image/png" href="favicon_br.png">
  <link rel="shortcut icon" type="image/png" href="favicon_br.png">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #06080e;
      --bg-card: rgba(13, 17, 28, 0.75);
      --accent: #00b4ff;
      --text: #ffffff;
      --subtext: #9eb1cd;
      --kakao: #fee500;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      background-color: var(--bg-deep);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
      word-break: keep-all;
    }

    .hero-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: url('background.jpg');
      background-size: cover;
      background-position: center;
      background-color: #000;
    }

    .hero-overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at center, rgba(6, 8, 14, 0.7) 0%, rgba(6, 8, 14, 0.98) 100%);
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 80px 24px 100px;
      text-align: center;
      position: relative;
    }

    .logo { 
      margin-bottom: 50px; 
      display: inline-block;
    }
    .logo img {
      height: 140px;
      filter: drop-shadow(0 10px 30px rgba(0, 180, 255, 0.2));
    }

    h1 {
      font-size: 34px;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: -1.5px;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 19px;
      color: var(--subtext);
      margin-bottom: 60px;
      font-weight: 300;
    }

    .btn-group { margin-bottom: 80px; }
    
    .btn {
      display: flex;
      width: 100%;
      height: 68px;
      margin: 16px auto;
      border-radius: 18px;
      font-size: 19px;
      font-weight: 700;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
    }

    .kakao { background: var(--kakao); color: #000; }
    .telegram { 
      background: rgba(255, 255, 255, 0.05); 
      color: #fff; 
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
    }

    .info-card {
      background: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 45px 35px;
      text-align: left;
      margin-bottom: 30px;
      backdrop-filter: blur(20px);
    }

    .info-card h3 {
      font-size: 20px;
      margin-bottom: 25px;
      color: var(--accent);
      font-weight: 700;
    }

    .info-card li { 
      margin-bottom: 15px; 
      display: flex; 
      color: #e2e8f0; 
      font-size: 16.5px;
    }
    
    .info-card li::before {
      content: '✓';
      margin-right: 15px;
      color: var(--accent);
      font-weight: bold;
    }

    .disclaimer {
      font-size: 13px;
      color: #555c66;
      background: rgba(0,0,0,0.3);
      padding: 25px;
      border-radius: 15px;
      margin-top: 100px;
      text-align: left;
    }

    @media (max-width: 480px) {
      .container { padding: 60px 20px; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  
  <div class="container">
    <div class="logo">
      <img src="logo.png" alt="BlackLabs Logo">
    </div>

    <h1>데이터 기반 주식 분석 플랫폼</h1>
    <p class="subtitle">시장의 흐름을 가장 먼저 확인하세요.</p>

    <div class="btn-group">
      <button onclick="openKakao()" class="btn kakao">카카오톡 실시간 리포트 신청</button>
      <a href="https://t.me/syk345" target="_blank" class="btn telegram">텔레그램 공식 채널 입장</a>
    </div>

    <div class="info-card">
      <h3>Premium Insight</h3>
      <ul style="list-style:none;">
        <li>실시간 글로벌 마켓 데이터 심층 분석</li>
        <li>데이터 기반 업종별 핵심 테마 분석</li>
        <li>매일 업데이트되는 전문가 데일리 리포트</li>
      </ul>
    </div>

    <button onclick="openKakao()" class="btn kakao" style="max-width: 400px; margin: 0 auto;">카카오톡 상담 시작하기</button>

    <div class="disclaimer">
      ※ 투자 유의사항: 본 플랫폼에서 제공하는 정보는 투자 참고 자료이며, 투자 결과에 대한 책임은 본인에게 있습니다.
    </div>
  </div>

  <script>
    function openKakao() {
      // 1. 카카오톡 앱을 직접 깨우는 스키마 (업자용 브릿지 코드)
      var scheme = "https://open.kakao.com/o/sUMFSdqi"; 
      // 2. 앱 실행 실패 시 이동할 최종 buly 링크
      var fallback = "https://buly.kr/CWvyQad";
      
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      
      if (isMobile) {
        var clickedAt = +new Date();
        
        // 일단 앱 실행 시도
        location.href = scheme;
        
        // 0.5초 동안 앱이 안 열리면 fallback 링크로 강제 전환
        setTimeout(function() {
          if (+new Date() - clickedAt < 2000) {
            window.location.replace(fallback);
          }
        }, 500);
      } else {
        window.open(fallback, '_blank');
      }
    }
  </script>
</body>
</html>
