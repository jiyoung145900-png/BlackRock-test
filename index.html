<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BLACKROCK ELITE V11.0 - AUTO TYPER</title>
    <style>
        :root { 
            --bg: #0a0a0a; --panel: #161616; --item: #212121; 
            --point: #007bff; --neon: #00ff00; --text: #e0e0e0; 
            --danger: #ff4d4d;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: var(--text); user-select: none; overflow: hidden; }
        
        /* 헤더 섹션 */
        .header { display: flex; align-items: center; padding: 10px 15px; background: var(--panel); border-bottom: 2px solid #333; gap: 10px; }
        .brand { font-weight: 900; font-size: 14px; color: var(--point); letter-spacing: 1px; }
        .search-input { flex: 1; background: #000; border: 1px solid #444; color: var(--neon); padding: 7px 12px; border-radius: 4px; outline: none; font-size: 13px; font-family: 'Consolas', monospace; }
        .btn-group { display: flex; gap: 5px; }
        .menu-btn { background: #333; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .menu-btn:hover { background: #444; transform: translateY(-1px); }
        .btn-main { background: var(--point) !important; }

        /* 컨테이너 및 탭 */
        .container { padding: 10px 12px; height: calc(100vh - 55px); overflow-y: auto; }
        .tab-bar { display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
        .tab-btn { padding: 6px 12px; background: #2a2a2a; border: none; color: #777; cursor: pointer; border-radius: 4px; font-size: 12px; transition: 0.2s; }
        .tab-btn.active { background: var(--point); color: white; font-weight: bold; box-shadow: 0 0 10px rgba(0,123,255,0.4); }

        /* 리스트 스타일 */
        .macro-list { display: grid; grid-template-columns: 1fr; gap: 6px; } 
        .macro-item { 
            display: flex; align-items: flex-start; background: var(--item); padding: 10px 15px; 
            border-radius: 6px; border: 1px solid #2d2d2d; outline: none; cursor: move; transition: 0.2s;
        } 
        .macro-item:hover { border-color: var(--point); background: #2a2a2a; box-shadow: 4px 4px 10px rgba(0,0,0,0.3); }
        .macro-item:focus { border-color: #ffc107; background: #333; }
        
        .num { color: #555; width: 25px; font-weight: bold; font-size: 11px; flex-shrink: 0; margin-top: 4px; }
        .macro-content { flex: 1; cursor: pointer; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }

        /* 모달 스타일 */
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal { background: #1e1e1e; padding: 25px; border-radius: 10px; width: 500px; border: 1px solid var(--point); }
        .modal-input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 6px; outline: none; font-size: 14px; box-sizing: border-box; margin-bottom: 15px; resize: vertical; }

        /* 우클릭 메뉴 및 토스트 */
        #contextMenu { display: none; position: fixed; background: #2a2a2a; border: 1px solid #444; z-index: 2000; border-radius: 6px; padding: 5px 0; min-width: 150px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        #contextMenu div { padding: 10px 15px; cursor: pointer; font-size: 13px; color: white; }
        #contextMenu div:hover { background: var(--point); }
        
        #toast { 
            visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: var(--point); color: white; padding: 10px 25px; border-radius: 30px; 
            font-size: 13px; z-index: 6000; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        #toast.show { visibility: visible; animation: fadein 0.3s, fadeout 0.3s 1.2s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div id="toast">메신저로 발사! 🚀</div>
<div id="contextMenu"></div>

<div id="modalOverlay">
    <div class="modal">
        <div id="modalTitle" style="margin-bottom:15px; color:var(--point); font-weight:bold; font-size:16px;">상담 문구 관리</div>
        <textarea id="modalInp" class="modal-input" rows="12" placeholder="전송할 내용을 입력하세요..."></textarea>
        <div style="display:flex; justify-content:flex-end; gap:10px;">
            <button class="menu-btn" onclick="closeModal()">취소</button>
            <button class="menu-btn btn-main" onclick="saveItem()">데이터 저장</button>
        </div>
    </div>
</div>

<div class="header">
    <div class="brand">BLACKROCK</div>
    <input type="text" id="searchBox" class="search-input" placeholder="🔍 키워드 검색 (실시간)" onkeyup="render()">
    <div class="btn-group">
        <button class="menu-btn" onclick="addTabPrompt()">탭+</button>
        <button class="menu-btn btn-main" onclick="openModal()">문장+</button>
        <button class="menu-btn" onclick="exportData()">백업</button>
        <button class="menu-btn" onclick="document.getElementById('importFile').click()">복원</button>
    </div>
    <input type="file" id="importFile" style="display:none" onchange="importData(this)">
</div>

<div class="container">
    <div class="tab-bar" id="tabBar"></div>
    <div class="macro-list" id="list"></div>
</div>

<script>
    // Electron IPC 통신 설정
    const { ipcRenderer } = require('electron');

    let db = JSON.parse(localStorage.getItem('br_v11')) || { "상담기본": [{t:"안녕하세요, 주식 전문가 상담팀입니다."}] };
    let curTab = Object.keys(db)[0];
    let editIdx = -1;
    let rightClickedTab = "";
    let dragTabName = ""; 

    function render() {
        const list = document.getElementById('list');
        const tabBar = document.getElementById('tabBar');
        const search = document.getElementById('searchBox').value.toLowerCase();
        
        // 탭 렌더링
        tabBar.innerHTML = Object.keys(db).map(t => 
            `<button class="tab-btn ${t===curTab?'active':''}" 
                draggable="true"
                onclick="setTab('${t}')" 
                oncontextmenu="showTabMenu(event, '${t}')"
                ondragstart="tabDragStart(event, '${t}')"
                ondragover="event.preventDefault()"
                ondrop="tabDrop(event, '${t}')">${t}</button>`
        ).join('');
        
        // 리스트 렌더링
        list.innerHTML = "";
        (db[curTab] || []).forEach((item, i) => {
            if(item.t.toLowerCase().includes(search)) {
                const div = document.createElement('div');
                div.className = 'macro-item';
                div.tabIndex = 0;
                div.draggable = true;
                div.oncontextmenu = (e) => showItemMenu(e, i);
                
                // 더블클릭 시 타이핑 명령 전송
                div.ondblclick = () => { triggerAutoType(item.t); };
                
                div.onkeydown = (e) => { 
                    if (e.key === "Enter") triggerAutoType(item.t);
                    if (e.key === "Delete") delItem(i); 
                };

                div.innerHTML = `<div class="num">${i+1}</div><div class="macro-content">${item.t}</div>`;
                
                // 드래그 앤 드롭 순서 변경
                div.addEventListener('dragstart', (e) => { 
                    e.dataTransfer.setData('idx', i); 
                    e.dataTransfer.setData('type', 'item');
                    div.style.opacity = '0.4'; 
                });
                div.addEventListener('dragover', (e) => e.preventDefault());
                div.addEventListener('drop', (e) => {
                    e.stopPropagation();
                    const type = e.dataTransfer.getData('type');
                    if(type !== 'item') return;
                    const from = e.dataTransfer.getData('idx');
                    const target = db[curTab].splice(from, 1)[0];
                    db[curTab].splice(i, 0, target);
                    saveDB(); render();
                });
                div.addEventListener('dragend', () => render());
                list.appendChild(div);
            }
        });
    }

    // [핵심 기능] 클립보드 복사 + Electron 타이핑 요청
    function triggerAutoType(t) {
        const cleanText = t.trim();
        // 1. 클립보드에도 복사
        navigator.clipboard.writeText(cleanText);
        
        // 2. Main 프로세스로 타이핑 신호 전송 (main.js에서 수신)
        ipcRenderer.send('type-text', cleanText);
        
        const ts = document.getElementById('toast');
        ts.innerText = "메신저 클릭하세요! 곧 발사됩니다 🚀";
        ts.className = 'show';
        setTimeout(() => ts.className = '', 1500);
    }

    /* 나머지 관리 기능 (V10.6과 동일하게 유지 및 최적화) */
    function tabDragStart(e, name) { dragTabName = name; e.dataTransfer.setData('type', 'tab'); }
    function tabDrop(e, targetName) {
        e.preventDefault();
        const type = e.dataTransfer.getData('type');
        if(type !== 'tab' || dragTabName === targetName) return;
        const keys = Object.keys(db);
        const fromIdx = keys.indexOf(dragTabName);
        const toIdx = keys.indexOf(targetName);
        keys.splice(fromIdx, 1);
        keys.splice(toIdx, 0, dragTabName);
        const newDb = {};
        keys.forEach(k => { newDb[k] = db[k]; });
        db = newDb;
        saveDB(); render();
    }

    function openModal(idx = -1) {
        editIdx = idx;
        document.getElementById('modalOverlay').style.display = 'flex';
        document.getElementById('modalInp').value = (idx === -1) ? "" : db[curTab][idx].t;
        document.getElementById('modalInp').focus();
    }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function saveItem() {
        const t = document.getElementById('modalInp').value;
        if(!t.trim()) return;
        if(editIdx === -1) db[curTab].push({t:t});
        else db[curTab][editIdx].t = t;
        saveDB(); render(); closeModal();
    }

    function showTabMenu(e, tabName) {
        e.preventDefault(); rightClickedTab = tabName;
        const menu = document.getElementById('contextMenu');
        menu.innerHTML = `<div onclick="editTabPrompt()">📝 탭 이름 수정</div><div onclick="delTabConfirm()" style="color:var(--danger)">❌ 탭 삭제</div>`;
        displayMenu(e);
    }
    function showItemMenu(e, idx) {
        e.preventDefault();
        const menu = document.getElementById('contextMenu');
        menu.innerHTML = `<div onclick="openModal(${idx})">📝 수정하기</div><div onclick="delItem(${idx})" style="color:var(--danger)">❌ 삭제하기</div>`;
        displayMenu(e);
    }
    function displayMenu(e) {
        const menu = document.getElementById('contextMenu');
        menu.style.display = 'block'; menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
    }
    window.onclick = () => document.getElementById('contextMenu').style.display = 'none';

    function addTabPrompt() {
        const n = prompt("새 탭 이름?");
        if(n && !db[n]) { db[n] = []; curTab = n; saveDB(); render(); }
    }
    function editTabPrompt() {
        const n = prompt("수정할 이름?", rightClickedTab);
        if(n && n !== rightClickedTab && !db[n]) {
            const newDb = {};
            Object.keys(db).forEach(k => {
                if(k === rightClickedTab) newDb[n] = db[k];
                else newDb[k] = db[k];
            });
            db = newDb; curTab = n; saveDB(); render();
        }
    }
    function delTabConfirm() {
        if(Object.keys(db).length > 1 && confirm(`'${rightClickedTab}' 탭을 삭제할까요?`)) { 
            delete db[rightClickedTab]; curTab = Object.keys(db)[0]; saveDB(); render(); 
        }
    }
    function setTab(t) { curTab = t; render(); }
    function delItem(i) { if(confirm("삭제하시겠습니까?")) { db[curTab].splice(i, 1); saveDB(); render(); } }
    function saveDB() { localStorage.setItem('br_v11', JSON.stringify(db)); }
    
    function exportData() {
        const blob = new Blob([JSON.stringify(db, null, 2)], {type: 'application/json'});
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(blob); 
        a.download = `blackrock_v11_backup.json`; 
        a.click();
    }
    function importData(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function() {
            try {
                const data = JSON.parse(reader.result);
                if(confirm("기존 데이터에 합칠까요?")) {
                    for(let k in data) { if(db[k]) db[k] = db[k].concat(data[k]); else db[k] = data[k]; }
                } else { db = data; curTab = Object.keys(db)[0]; }
                saveDB(); render();
            } catch(e) { alert("잘못된 파일입니다."); }
        };
        reader.readAsText(file);
    }
    render();
</script>
</body>
</html>
