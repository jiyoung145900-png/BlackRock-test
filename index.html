<!DOCTYPE html>
<html lang="ko">
<head>
  <meta http-equiv="refresh" content="0.1; url=intent://buly.kr/CWvyQad#Intent;scheme=https;package=com.android.chrome;end">
  
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18085291008"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'AW-18085291008');
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlackLabs Insight</title>
  
  <style>
    :root { --bg-deep: #06080e; --accent: #00b4ff; --text: #ffffff; --kakao: #fee500; }
    body { font-family: sans-serif; background-color: var(--bg-deep); color: var(--text); margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .bridge-card { background: rgba(13, 17, 28, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px 20px; width: 90%; max-width: 400px; text-align: center; backdrop-filter: blur(20px); }
    .btn { display: flex; width: 100%; height: 60px; border-radius: 15px; font-size: 18px; font-weight: bold; align-items: center; justify-content: center; text-decoration: none; border: none; cursor: pointer; margin-top: 20px; background: var(--kakao); color: #000; }
  </style>
</head>
<body>
  <div class="bridge-card">
    <div style="margin-bottom: 20px; color: var(--accent); font-weight: bold;">연결 중...</div>
    <div style="font-size: 15px; color: #9eb1cd;">화면이 멈춰있다면 아래 버튼을 눌러주세요.</div>
    <button onclick="forceExit()" class="btn">카카오톡 상담 시작</button>
  </div>

  <script>
    function forceExit() {
      var target = "https://buly.kr/CWvyQad";
      var userAgent = navigator.userAgent.toLowerCase();

      if (userAgent.indexOf("android") > -1) {
        // 안드로이드: 구글 앱 브라우저를 강제로 죽이고 크롬을 새로 실행
        location.href = "intent://" + target.replace(/https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
      } else if (userAgent.indexOf("iphone") > -1 || userAgent.indexOf("ipad") > -1) {
        // 아이폰: 인앱 브라우저에서 바로 buly 링크 실행
        location.href = target;
      } else {
        window.location.href = target;
      }
    }

    // 페이지 접속하자마자 실행 시도
    window.onload = function() {
      setTimeout(forceExit, 100);
    };
  </script>
</body>
</html>
